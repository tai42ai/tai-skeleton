# Packaged ecosystem catalog for the open-source TAI world.
#
# A static, hand-maintained snapshot of the ecosystem's registrations, shipped
# inside the tai-skeleton package and rendered by `tai catalog`. It is NOT a
# loadable manifest and NOT an import-time registry walk: `tai catalog` reads it
# offline on a bare skeleton install with zero plugin imports.
#
# Schema
# ------
# `entries` is a list; each entry is:
#   name        registration name (the tool/extension/connector/... identifier)
#   kind        one of: tool | agent | extension | connector | channel |
#               accounts | identity | backend | storage | monitoring |
#               webhook-verifier | config
#   group       the category / kind detail (management family, ExtensionKind,
#               connector category, config mode, ...)
#   package     the distribution the registration ships in
#   module      the Python module a host imports to trigger the registration
#   description one line describing what it does
#
# An entry carries NO repo field. The repo is derived at render time by joining
# the entry's `package` against the `packages` map below — repo lives in ONE
# place, never duplicated per entry. A `package` absent from that map is a loud
# error at render time, never a blank repo cell.

entries:
  # -- Tools: tai-skeleton built-ins ----------------------------------------
  # Only the two runtime-native builtins carry catalog rows. Management
  # capabilities live in the operations layer and project onto the
  # MCP tool surface at runtime (no catalog rows for projected tools).
  - name: ask_user
    kind: tool
    group: interactions
    package: tai-skeleton
    module: tai_skeleton.tools.builtin.interactions
    description: Ask a human a question mid-run and block until they answer.
  - name: file_loader
    kind: tool
    group: file-loading
    package: tai-skeleton
    module: tai_skeleton.tools.builtin.file_loader
    description: Load a file from a url or a storage resource id and return its content.

  # -- Tools: tai-toolbox ----------------------------------------------------
  - name: current_time_info
    kind: tool
    group: utility
    package: tai-toolbox
    module: tai_toolbox.tools.current_time_info
    description: Return the current time as a structured object.
  - name: generate_embeddings
    kind: tool
    group: embeddings
    package: tai-toolbox
    module: tai_toolbox.tools.generate_embeddings
    description: Generate embeddings for a single string or a list of strings.
  - name: generate_uuid
    kind: tool
    group: utility
    package: tai-toolbox
    module: tai_toolbox.tools.generate_uuid
    description: Generate a random UUID (version 4).
  - name: pad_embeddings
    kind: tool
    group: embeddings
    package: tai-toolbox
    module: tai_toolbox.tools.pad_embeddings
    description: Pad each embedding vector with zeros up to a target dimension.
  - name: request
    kind: tool
    group: http
    package: tai-toolbox
    module: tai_toolbox.tools.request
    description: Execute an HTTP request through a curl-backed session.

  # -- Agents: tai-agents ----------------------------------------------------
  - name: deep_agent
    kind: agent
    group: ready-made
    package: tai-agents
    module: tai_agents.deep_agent
    description: Run a deep agent with planning, subagents, skills, and a filesystem backend.
  - name: refine_agent
    kind: agent
    group: ready-made
    package: tai-agents
    module: tai_agents.refine_agent
    description: Run an Evaluator-Critic refinement loop until the Critic approves or the budget runs out.
  - name: voting_agent
    kind: agent
    group: ready-made
    package: tai-agents
    module: tai_agents.voting_agent
    description: Run a voting workflow — voter LLMs answer in parallel, then a judge LLM decides.
  - name: retrieval_tools_agent
    kind: agent
    group: ready-made
    package: tai-agents
    module: tai_agents.retrieval_tools_agent
    description: A tools agent that retrieves its tools on demand from a vector store.
  - name: tools_agent
    kind: agent
    group: ready-made
    package: tai-agents
    module: tai_agents.tools_agent
    description: Run a LangGraph tools agent over tools loaded by name (and optional presets).
  - name: mcp_tools_agent
    kind: agent
    group: ready-made
    package: tai-agents
    module: tai_agents.mcp_tools_agent
    description: Run a LangGraph tools agent whose tools are loaded from an MCP configuration.
  - name: vqa_agent
    kind: agent
    group: ready-made
    package: tai-agents
    module: tai_agents.vqa_agent
    description: Analyze an image and answer a query about it using a multimodal LLM.

  # -- Extensions: tai-skeleton built-ins -----------------------------------
  - name: monitor
    kind: extension
    group: wrapper
    package: tai-skeleton
    module: tai_skeleton.extensions.builtin.monitor
    description: Trace a standalone tool call as one live span.
  - name: ask_external
    kind: extension
    group: transformer
    package: tai-skeleton
    module: tai_skeleton.extensions.builtin.ask_external
    description: Wrap a callback-url tool into an external human-in-the-loop question.

  # -- Extensions: tai-toolbox ----------------------------------------------
  - name: chain
    kind: extension
    group: transformer
    package: tai-toolbox
    module: tai_toolbox.extensions.chain
    description: Branch a tool into a variant that transforms its output and calls a next tool.
  - name: batch
    kind: extension
    group: transformer
    package: tai-toolbox
    module: tai_toolbox.extensions.batch
    description: Branch a tool into a variant that runs many instances at once.
  - name: output_schema
    kind: extension
    group: transformer
    package: tai-toolbox
    module: tai_toolbox.extensions.output_schema
    description: Branch a tool into a variant that forces its output to a caller-supplied JSON Schema and validates results against it.
  - name: cache
    kind: extension
    group: wrapper
    package: tai-toolbox
    module: tai_toolbox.extensions.cache
    description: Branch a tool into a variant that memoizes results by call arguments.
  - name: proxy
    kind: extension
    group: wrapper
    package: tai-toolbox
    module: tai_toolbox.extensions.proxy
    description: Branch a tool into a variant that runs the wrapped tool through a proxy.
  - name: prometheus_metrics
    kind: extension
    group: wrapper
    package: tai-toolbox
    module: tai_toolbox.extensions.prometheus
    description: Branch a tool into a variant that records a Prometheus call metric.

  # -- Storage providers -----------------------------------------------------
  - name: s3
    kind: storage
    group: object-store
    package: tai-storage-s3
    module: tai_storage_s3
    description: Storage backend serving text, binary, and media content over an S3 bucket.
  - name: github
    kind: storage
    group: git-backed
    package: tai-storage-github
    module: tai_storage_github
    description: Storage backend serving text and binary/media content over a GitHub repository.
  - name: local
    kind: storage
    group: filesystem
    package: tai-storage-local
    module: tai_storage_local
    description: Storage backend serving text and binary content from a local directory tree.

  # -- Execution backends ----------------------------------------------------
  - name: arq
    kind: backend
    group: task-queue
    package: tai-backend-arq
    module: tai_backend_arq.backend
    description: arq execution backend — background tool runs and schedules over Redis.
  - name: celery
    kind: backend
    group: task-queue
    package: tai-backend-celery
    module: tai_backend_celery.core.backend
    description: Celery execution backend — worker/beat/flower runtime and RedBeat scheduling.
  - name: rq
    kind: backend
    group: task-queue
    package: tai-backend-rq
    module: tai_backend_rq.backend
    description: RQ execution backend — background tool runs and schedules over Redis.

  # -- Monitoring backends ---------------------------------------------------
  - name: langfuse
    kind: monitoring
    group: observability
    package: tai-monitoring-langfuse
    module: tai_monitoring_langfuse.register
    description: Langfuse monitoring backend — trace/span emission and the observability read surface.

  # -- Webhook verifiers -----------------------------------------------------
  - name: shared_secret
    kind: webhook-verifier
    group: builtin
    package: tai-skeleton
    module: tai_skeleton.webhooks.builtin.shared_secret
    description: Verify a universal_webhook topic against a shared header secret.
  - name: github
    kind: webhook-verifier
    group: provider
    package: tai-webhook-verifier-github
    module: tai_webhook_verifier_github
    description: Verify a GitHub webhook delivery's X-Hub-Signature-256 HMAC before dispatch.

  # -- Connectors ------------------------------------------------------------
  - name: google
    kind: connector
    group: communication
    package: tai-connector-google
    module: tai_connector.google.core.connector
    description: OAuth connector for Google (Gmail, Calendar, Drive).
  - name: atlassian
    kind: connector
    group: dev-tools
    package: tai-connector-atlassian
    module: tai_connector.atlassian.core.connector
    description: OAuth connector for Atlassian (Jira, Confluence, Compass).

  # -- Config-manager providers ---------------------------------------------
  - name: k8s
    kind: config
    group: config-manager
    package: tai-config-k8s
    module: tai_config_k8s.manager
    description: Kubernetes ConfigManager backing env via Secrets and manifest via ConfigMaps.

  # -- Channels: ask_user interaction deliverers ----------------------------
  - name: telegram
    kind: channel
    group: chat
    package: tai-channel-telegram
    module: tai_channel_telegram.register
    description: Deliver ask_user questions to a Telegram chat and bridge the typed reply back.
  - name: slack
    kind: channel
    group: chat
    package: tai-channel-slack
    module: tai_channel_slack.register
    description: Deliver ask_user questions to a Slack channel and bridge the threaded reply back.
  - name: twilio
    kind: channel
    group: sms
    package: tai-channel-twilio
    module: tai_channel_twilio.register
    description: Deliver ask_user questions to a phone over Twilio SMS/WhatsApp and bridge the reply back.

  # -- Accounts providers ----------------------------------------------------
  - name: accounts-postgres
    kind: accounts
    group: password
    package: tai-accounts-postgres
    module: tai_accounts_postgres
    description: Postgres-backed accounts provider — password login, sessions, invites, and first-run bootstrap.
  - name: accounts-oidc
    kind: accounts
    group: oidc
    package: tai-accounts-oidc
    module: tai_accounts_oidc
    description: OIDC/OAuth2 login accounts provider — browser sign-in backed by Redis-stored sessions.

  # -- Identity providers ----------------------------------------------------
  - name: redis
    kind: identity
    group: api-key
    package: tai-identity-redis
    module: tai_identity_redis
    description: Redis-backed api-key identity provider — validate inbound tokens and provision keys.
  - name: identity-oidc
    kind: identity
    group: jwt
    package: tai-identity-oidc
    module: tai_identity_oidc
    description: Validate-only OIDC identity provider — verifies issuer-minted JWTs against the issuer's JWKS.

# package -> repository mapping (the single source of the repo column). Every
# package named in `entries` MUST appear here.
packages:
  tai-skeleton: tai-skeleton
  tai-toolbox: tai-toolbox
  tai-agents: tai-agents
  tai-storage-s3: tai-storage-s3
  tai-storage-github: tai-storage-github
  tai-storage-local: tai-storage-local
  tai-webhook-verifier-github: tai-webhook-verifier-github
  tai-connector-google: tai-connector-google
  tai-connector-atlassian: tai-connector-atlassian
  tai-config-k8s: tai-config-k8s
  tai-channel-telegram: tai-channel-telegram
  tai-channel-slack: tai-channel-slack
  tai-channel-twilio: tai-channel-twilio
  tai-identity-redis: tai-identity-redis
  tai-accounts-postgres: tai-accounts-postgres
  tai-accounts-oidc: tai-accounts-oidc
  tai-identity-oidc: tai-identity-oidc
  tai-backend-arq: tai-backend-arq
  tai-backend-celery: tai-backend-celery
  tai-backend-rq: tai-backend-rq
  tai-monitoring-langfuse: tai-monitoring-langfuse
