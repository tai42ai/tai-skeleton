name: Feature request
description: Propose an addition or change to tai42-skeleton
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should be added or changed, and what problem does it solve? Note that providers (OAuth connectors, storage backends, config providers, worker backends, monitoring) ship as separate plugins — features that fit a plugin belong there, not in the skeleton.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tai42-skeleton version
      description: The version you are using, if relevant.
      placeholder: "0.1.0"
    validations:
      required: false
